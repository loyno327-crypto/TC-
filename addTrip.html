<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('styles'); ?>
</head>
<body>
  <div class="form-wrap">
    <div class="form-card">
      <h3>Внести поездку</h3>
      <p class="muted">Основной маршрут + один или несколько маршрутов грузов.</p>

      <form id="tripForm">
        <div class="field">
          <label>Основной маршрут</label>
          <input id="mainRoute" class="input" type="text" placeholder="Ульяновск - Казань - Ульяновск" required />
        </div>

        <div class="cols-2">
          <div class="field">
            <label>Общий километраж</label>
            <input id="totalKm" class="input" type="number" min="1" value="800" required />
          </div>
          <div class="field">
            <label>Холостой километраж (обратно пустым)</label>
            <input id="emptyKm" class="input" type="number" min="0" value="0" required />
          </div>
        </div>

        <div class="card" style="margin-top:8px;">
          <div class="head-inline">
            <strong>Маршруты грузов</strong>
            <button type="button" class="btn btn-ghost" onclick="addCargoRow()">+ Добавить маршрут груза</button>
          </div>
          <div id="cargoRows"></div>
        </div>

        <div class="actions">
          <button type="button" class="btn btn-ghost" onclick="closeForm()">Отмена</button>
          <button type="submit" class="btn btn-primary">Сохранить поездку</button>
        </div>
      </form>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const cargoRows = document.getElementById('cargoRows');
    const statusEl = document.getElementById('status');

    function setStatus(msg, type = 'success') {
      statusEl.className = `status ${type}`;
      statusEl.textContent = msg;
    }

    function addCargoRow(values = {}) {
      const row = document.createElement('div');
      row.className = 'cargo-row cols-cargo';
      row.innerHTML = `
        <input class="input cargo-route" type="text" placeholder="Маршрут груза" value="${values.route || ''}" required />
        <input class="input cargo-amount" type="number" min="1" placeholder="Стоимость" value="${values.amount || ''}" required />
        <select class="input cargo-pay">
          <option value="cash">Наличные</option>
          <option value="no_vat">Без НДС</option>
          <option value="vat">С НДС</option>
        </select>
        <button type="button" class="btn btn-ghost" onclick="removeCargoRow(this)">✕</button>
      `;
      row.querySelector('.cargo-pay').value = values.paymentType || 'cash';
      cargoRows.appendChild(row);
    }

    function removeCargoRow(btn) {
      if (cargoRows.children.length <= 1) {
        setStatus('Нужен хотя бы один маршрут груза', 'error');
        return;
      }
      btn.closest('.cargo-row').remove();
    }

    function collectData() {
      return {
        mainRoute: document.getElementById('mainRoute').value.trim(),
        totalKm: Number(document.getElementById('totalKm').value),
        emptyKm: Number(document.getElementById('emptyKm').value),
        cargos: Array.from(document.querySelectorAll('.cargo-row')).map((row) => ({
          route: row.querySelector('.cargo-route').value.trim(),
          amount: Number(row.querySelector('.cargo-amount').value),
          paymentType: row.querySelector('.cargo-pay').value
        }))
      };
    }

    function validate(data) {
      if (!data.mainRoute) return 'Заполните основной маршрут';
      if (!(data.totalKm > 0)) return 'Километраж должен быть больше 0';
      if (data.emptyKm < 0 || data.emptyKm > data.totalKm) return 'Холостой км должен быть от 0 до общего';
      if (!data.cargos.length) return 'Добавьте маршрут груза';
      for (let i = 0; i < data.cargos.length; i++) {
        if (!data.cargos[i].route) return `Заполните маршрут груза ${i + 1}`;
        if (!(data.cargos[i].amount > 0)) return `Сумма у груза ${i + 1} должна быть больше 0`;
      }
      return null;
    }

    function closeForm() {
      if (window.opener) {
        window.close();
      } else {
        google.script.host.close();
      }
    }

    document.getElementById('tripForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const data = collectData();
      const err = validate(data);
      if (err) {
        setStatus(err, 'error');
        return;
      }

      setStatus('Сохраняем...');
      google.script.run
        .withSuccessHandler(function() {
          setStatus('Поездка успешно внесена', 'success');
          if (window.opener) window.opener.postMessage({ type: 'trip-saved' }, '*');
          setTimeout(closeForm, 600);
        })
        .withFailureHandler(function(error) {
          setStatus(error.message || 'Ошибка сохранения', 'error');
        })
        .saveTrip(data);
    });

    addCargoRow({ route: 'Ульяновск - Зеленодольск', paymentType: 'cash' });
    addCargoRow({ route: 'Ульяновск - с. Старое Кощаково', paymentType: 'vat' });
  </script>
</body>
</html>
