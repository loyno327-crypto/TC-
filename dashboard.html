<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('styles'); ?>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h2>Панель «Заявки»</h2>
        <p>Все занесенные поездки и движение средств</p>
      </div>
      <div class="top-actions">
        <button class="btn btn-ghost" onclick="loadPanel()">Обновить</button>
        <button class="btn btn-primary" onclick="openAddTrip()">Внести поездку</button>
      </div>
    </header>

    <div class="tabs">
      <button id="tabTrips" class="tab active" onclick="switchTab('trips')">Поездки</button>
      <button id="tabMoney" class="tab" onclick="switchTab('money')">Информация о движении средств</button>
    </div>

    <section id="viewTrips">
      <div id="tripList" class="trip-list"></div>
    </section>

    <section id="viewMoney" style="display:none;">
      <div class="money-grid" id="moneyGrid"></div>
    </section>

    <div id="status" class="status"></div>
  </div>

  <div id="tripModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Подробная поездка</h3>
        <button class="btn btn-ghost" onclick="closeTripModal()">Закрыть</button>
      </div>
      <div id="tripDetails"></div>
    </div>
  </div>

  <script>
    let panelData = null;

    function formatMoney(v) {
      return new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 0 }).format(v || 0) + ' ₽';
    }

    function formatDate(v) {
      if (!v) return '—';
      return new Date(v).toLocaleDateString('ru-RU');
    }

    function setStatus(msg, type = 'success') {
      const el = document.getElementById('status');
      el.className = `status ${type}`;
      el.textContent = msg;
      setTimeout(() => { el.textContent = ''; }, 2500);
    }

    function switchTab(tab) {
      const trips = tab === 'trips';
      document.getElementById('viewTrips').style.display = trips ? 'block' : 'none';
      document.getElementById('viewMoney').style.display = trips ? 'none' : 'block';
      document.getElementById('tabTrips').classList.toggle('active', trips);
      document.getElementById('tabMoney').classList.toggle('active', !trips);
    }

    function openAddTrip() {
      google.script.run
        .withSuccessHandler(function(baseUrl) {
          if (!baseUrl) {
            google.script.run.openAddTripDialog();
            return;
          }
          window.open(`${baseUrl}?view=addTrip`, '_blank');
        })
        .getAppBaseUrl();
    }

    function renderTrips(trips) {
      const list = document.getElementById('tripList');
      if (!trips.length) {
        list.innerHTML = '<div class="card">Пока нет заявок. Нажмите «Внести поездку».</div>';
        return;
      }

      list.innerHTML = trips.map((trip) => `
        <div class="card trip-item" onclick="showTrip('${trip.tripId}')">
          <div class="trip-row">
            <div>
              <div class="trip-route">${trip.mainRoute}</div>
              <div class="trip-sub">${formatDate(trip.date)} · Грузов: ${trip.cargoCount} · ${trip.totalKm} км</div>
            </div>
            <div class="trip-price">${formatMoney(trip.totalRevenue)}</div>
          </div>
        </div>
      `).join('');
    }

    function renderMoney(flow) {
      const pairs = [
        ['Общая выручка', flow.revenue],
        ['Топливо', flow.fuel],
        ['Лизинг', flow.leasing],
        ['Ремонт и обслуживание', flow.repair],
        ['Водитель к выплате', flow.driverNet],
        ['Налог водителя', flow.driverTax],
        ['Компании после корректировок', flow.companyNet]
      ];

      document.getElementById('moneyGrid').innerHTML = pairs.map(([label, value]) => `
        <div class="card">
          <div class="label">${label}</div>
          <div class="value">${formatMoney(value)}</div>
        </div>
      `).join('');
    }

    function loadPanel() {
      google.script.run
        .withSuccessHandler(function(data) {
          panelData = data;
          renderTrips(data.trips || []);
          renderMoney(data.moneyFlow || {});
          setStatus('Данные обновлены');
        })
        .withFailureHandler(function(err) {
          setStatus(err.message || 'Ошибка загрузки', 'error');
        })
        .getRequestsPanelData();
    }

    function showTrip(tripId) {
      google.script.run
        .withSuccessHandler(function(detail) {
          const rows = detail.cargos.map((c, i) => `
            <tr>
              <td>${i + 1}</td>
              <td>${c.route}</td>
              <td>${c.paymentType}</td>
              <td>${formatMoney(c.amount)}</td>
              <td>${formatMoney(c.fuel)}</td>
              <td>${formatMoney(c.leasing)}</td>
              <td>${formatMoney(c.repair)}</td>
              <td>${formatMoney(c.driverNet)}</td>
              <td>${formatMoney(c.companyNet)}</td>
            </tr>
          `).join('');

          document.getElementById('tripDetails').innerHTML = `
            <div class="detail-head">
              <div><b>Основной маршрут:</b> ${detail.mainRoute}</div>
              <div><b>Дата:</b> ${formatDate(detail.date)}</div>
              <div><b>Пробег:</b> ${detail.totalKm} км (холостой: ${detail.emptyKm} км)</div>
              <div><b>Общая стоимость:</b> ${formatMoney(detail.totals.amount)}</div>
            </div>
            <table class="tbl">
              <thead>
                <tr>
                  <th>#</th><th>Маршрут груза</th><th>Оплата</th><th>Сумма</th><th>Топливо</th><th>Лизинг</th><th>Ремонт</th><th>Водителю</th><th>Компания</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          `;
          document.getElementById('tripModal').classList.remove('hidden');
        })
        .withFailureHandler(function(err) {
          setStatus(err.message || 'Не удалось открыть поездку', 'error');
        })
        .getTripDetails(tripId);
    }

    function closeTripModal() {
      document.getElementById('tripModal').classList.add('hidden');
    }

    window.addEventListener('message', function(event) {
      if (event?.data?.type === 'trip-saved') loadPanel();
    });

    loadPanel();
  </script>
</body>
</html>
