<style>
  :root {
    --bg: #f5f7fb;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --border: #e5e7eb;
    --success: #16a34a;
    --danger: #dc2626;
    --radius: 14px;
    --shadow: 0 8px 28px rgba(15, 23, 42, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
  }

  .app {
    display: grid;
    grid-template-columns: 76px 1fr;
    min-height: 100vh;
  }

  .sidebar {
    background: #0f172a;
    color: #fff;
    padding: 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }

  .logo {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(145deg, #2563eb, #0ea5e9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .content { padding: 20px 18px; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 10px;
  }

  .title { font-size: 20px; font-weight: 700; }
  .subtitle { color: var(--muted); font-size: 12px; }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 10px 12px;
    font-weight: 600;
    cursor: pointer;
    transition: .18s ease;
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { background: var(--primary-dark); }

  .btn-ghost {
    background: #eef2ff;
    color: #1e3a8a;
  }

  .filters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .input, select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 10px;
    background: #fff;
    font-size: 14px;
  }

  .kpis {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px;
    animation: fadeIn .22s ease;
  }

  .card .label { font-size: 12px; color: var(--muted); }
  .card .value { font-size: 18px; font-weight: 700; margin-top: 4px; }

  .chart {
    height: 220px;
    padding: 6px;
  }

  .status {
    font-size: 12px;
    margin-top: 8px;
    min-height: 15px;
  }

  .status.success { color: var(--success); }
  .status.error { color: var(--danger); }

  .form-wrap {
    padding: 18px;
    background: var(--bg);
    min-height: 100vh;
  }

  .form-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 18px;
    animation: slideUp .2s ease;
  }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }

  .switch {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .switch label { flex: 1; text-align: center; padding: 8px; cursor: pointer; }
  .switch input { display: none; }
  .switch input:checked + span {
    color: #fff;
    background: var(--primary);
    display: block;
    border-radius: 8px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
