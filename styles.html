<style>
  :root {
    --bg: #f5f7fb;
    --card: #fff;
    --text: #1f2937;
    --muted: #6b7280;
    --primary: #2563eb;
    --border: #e5e7eb;
    --success: #16a34a;
    --danger: #dc2626;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: Inter, system-ui, Arial, sans-serif; }

  .app-shell { padding: 16px; }
  .topbar { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; }
  .topbar h2 { margin:0; }
  .topbar p { margin:2px 0 0; font-size:12px; color:var(--muted); }
  .top-actions { display:flex; gap:8px; }

  .btn { border:none; border-radius:10px; padding:10px 12px; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-ghost { background:#eef2ff; color:#1e3a8a; }

  .tabs { display:flex; gap:8px; margin-bottom:12px; }
  .tab { border:1px solid var(--border); background:#fff; padding:8px 12px; border-radius:999px; cursor:pointer; }
  .tab.active { background:#dbeafe; border-color:#93c5fd; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px; }
  .trip-list { display:grid; gap:10px; }
  .trip-item { cursor:pointer; }
  .trip-row { display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .trip-route { font-weight:700; }
  .trip-sub { color:var(--muted); font-size:12px; margin-top:2px; }
  .trip-price { font-weight:700; white-space:nowrap; }

  .money-grid { display:grid; gap:10px; grid-template-columns:repeat(3, minmax(180px, 1fr)); }
  .label { font-size:12px; color:var(--muted); }
  .value { margin-top:4px; font-size:18px; font-weight:700; }

  .status { margin-top:10px; min-height:16px; font-size:12px; }
  .status.success { color:var(--success); }
  .status.error { color:var(--danger); }

  .modal { position:fixed; inset:0; background:rgba(15,23,42,.45); display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal.hidden { display:none; }
  .modal-card { background:#fff; width:min(1100px, 100%); max-height:90vh; overflow:auto; border-radius:14px; padding:14px; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }

  .tbl { width:100%; border-collapse:collapse; font-size:13px; }
  .tbl th, .tbl td { border-bottom:1px solid var(--border); padding:8px; text-align:left; }
  .detail-head { display:grid; gap:6px; margin-bottom:10px; }

  .form-wrap { padding:18px; }
  .form-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:16px; }
  .muted { color:var(--muted); font-size:12px; margin-top:-4px; }
  .field { margin-bottom:10px; }
  .field label { display:block; margin-bottom:6px; color:var(--muted); font-size:12px; }
  .input { width:100%; border:1px solid var(--border); border-radius:10px; padding:9px 10px; }
  .cols-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .head-inline { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .cols-cargo { display:grid; grid-template-columns:1.6fr .8fr .8fr auto; gap:8px; margin-bottom:8px; }
  .actions { margin-top:12px; display:flex; justify-content:flex-end; gap:8px; }
</style>
